[mcp_servers.juriai_agent_bus]
url = "http://127.0.0.1:8766/mcp"
required = false
startup_timeout_sec = 10
tool_timeout_sec = 60
bearer_token_env_var = "JURIAI_AGENT_BUS_TOKEN"

[mcp_servers.juriai_agent_bus.tools.read_inbox]
approval_mode = "approve"

[mcp_servers.juriai_agent_bus.tools.heartbeat]
approval_mode = "approve"

[mcp_servers.juriai_agent_bus.tools.send_message]
approval_mode = "approve"

[agents]
max_threads = 6
max_depth = 1
